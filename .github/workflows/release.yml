name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set version in tauri.conf.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = 'apps/desktop/src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(p, 'utf-8'));
            conf.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync(p, JSON.stringify(conf, null, 2) + '\n');
          "

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "ADT Studio ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false

  docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: true
          tags: |
            ghcr.io/unicef/adt-studio:latest
            ghcr.io/unicef/adt-studio:${{ needs.release.outputs.tag }}

      - name: Generate standalone docker-compose.yml
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          printf '# ADT Studio %s\n# Usage:  docker compose up\n# Open:   http://localhost:8080\n# Books persist in ./books/\nservices:\n  adt-studio:\n    image: ghcr.io/unicef/adt-studio:%s\n    ports:\n      - "${PORT:-8080}:80"\n    volumes:\n      - ./books:/app/books\n    restart: unless-stopped\n' "$TAG" "$TAG" > docker-compose.yml

      - name: Upload docker-compose.yml to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release.outputs.tag }} docker-compose.yml \
            --repo ${{ github.repository }} \
            --clobber

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=${{ github.ref_name }} \
            --jq '.body')
          gh release edit ${{ github.ref_name }} --notes "$NOTES"
